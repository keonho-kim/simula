# 로컬 실행용 예시 파일이다.
# 실제 비밀값은 provider 공통 테이블의 `API_KEY`에 넣고 저장소에는 커밋하지 않는다.

[env]
log_level = "INFO"
max_recipients_per_message = 2
enable_checkpointing = false
# rng_seed = 1234

[time]
# 동적 시간축에서는 planner가 round별 경과 시간을 추론한다.
# max_rounds = 7

[db]
provider = "sqlite"

[db.sqlite]
dir = "./data/db"
path = "./data/db/runtime.sqlite"

[db.postgresql]
host = "127.0.0.1"
port = 5432
user = "postgres"
password = "1234"
database = "simula"
schema = "simula"
runs_table = "runs"
actors_table = "actors"
activities_table = "activities"
observer_reports_table = "observer_reports"
final_reports_table = "final_reports"

[fs]
output_dir = "./output"

[llm.openai]
# 공용 OpenAI 기본값이다.
# provider가 openai인 role은 아래 값을 기본으로 상속하고,
# role별 세부 옵션은 [llm.<role>] 안에 직접 둔다.
API_KEY = "<put-your-api-key-here>"
base_url = "https://api.openai.com/v1"
reasoning_effort = "none"
verbosity = "medium"

[llm.anthropic]
API_KEY = "<put-your-api-key-here>"
base_url = "https://api.anthropic.com"
effort = "medium"

[llm.google]
# 현재 google provider는 Gemini API와 Vertex AI를 모두 지원한다.
# Gemini API를 쓸 때는 API_KEY를 사용하고, Vertex AI를 쓸 때는
# project_id + location (+ 필요 시 credentials_path)을 사용한다.
API_KEY = "<put-your-api-key-here>"
base_url = "https://generativelanguage.googleapis.com"
# project_id = "my-gcp-project"
# location = "us-central1"
# credentials_path = "/abs/path/to/service-account.json"
thinking_budget = 256
thinking_level = "low"

[llm.bedrock]
# Bedrock는 ChatBedrockConverse 기준이다.
# 인증은 기본적으로 AWS 자격증명 체인을 사용한다.
region_name = "us-east-1"
# credentials_profile_name = "default"
# endpoint_url = "https://bedrock-runtime.us-east-1.amazonaws.com"

[llm.ollama]
base_url = "http://127.0.0.1:11434"
reasoning = false

[llm.vllm]
API_KEY = "<put-your-api-key-here>"
base_url = "http://127.0.0.1:8000/v1"

[llm.planner]
provider = "openai"
model = "gpt-5.4-mini"
max_tokens = 7192
# reasoning_effort = "low"
# verbosity = "medium"

[llm.generator]
provider = "openai"
model = "gpt-5.4-mini"
max_tokens = 7192
# reasoning_effort = "low"
# verbosity = "medium"

[llm.coordinator]
provider = "openai"
model = "gpt-5.4-mini"
max_tokens = 7192
# reasoning_effort = "low"
# verbosity = "medium"

[llm.actor]
provider = "ollama"
model = "nemotron-cascade-2:latest"
max_tokens = 7192

[llm.observer]
provider = "openai"
model = "gpt-5.4-mini"
max_tokens = 7192
# reasoning_effort = "medium"
verbosity = "low"

[llm.fixer]
provider = "openai"
model = "gpt-5.4-mini"
max_tokens = 2400
# reasoning_effort = "none"
# verbosity = "low"

# Provider별 role override 샘플
#
# OpenAI role override 예시
# provider=openai인 role은 [llm.openai]를 기본 상속한다.
# 아래처럼 [llm.<role>] 안에 provider-specific 옵션을 함께 둘 수 있다.
# API_KEY = "<put-your-api-key-here>"
# base_url = "https://api.openai.com/v1"
# reasoning_effort = "high"
# verbosity = "high"
#
# [llm.generator]
# provider = "openai"
# model = "gpt-5.4-mini"
# reasoning_effort = "low"
# verbosity = "medium"
#
# [llm.actor]
# provider = "openai"
# model = "gpt-5.4-mini"
# reasoning_effort = "none"
# verbosity = "low"
#
# [llm.observer]
# provider = "openai"
# model = "gpt-5.4-mini"
# reasoning_effort = "low"
# verbosity = "low"
#
# Anthropic role override 예시
# [llm.planner]
# provider = "anthropic"
# model = "claude-sonnet-4-5"
# API_KEY = "<put-your-api-key-here>"
# base_url = "https://api.anthropic.com"
# effort = "max"
#
# Google role override 예시
# [llm.generator]
# provider = "google"
# model = "gemini-2.5-flash"
# Gemini API 예시
# API_KEY = "<put-your-api-key-here>"
# base_url = "https://generativelanguage.googleapis.com"
# thinking_budget = 512
# thinking_level = "medium"
#
# Vertex AI 예시
# project_id = "my-gcp-project"
# location = "us-central1"
# credentials_path = "/abs/path/to/service-account.json"
#
# Bedrock role override 예시
# [llm.observer]
# provider = "bedrock"
# model = "anthropic.claude-3-5-sonnet-20240620-v1:0"
# region_name = "ap-northeast-2"
# credentials_profile_name = "default"
# endpoint_url = "https://bedrock-runtime.ap-northeast-2.amazonaws.com"
#
# Ollama role override 예시
# [llm.actor]
# provider = "ollama"
# model = "nemotron-cascade-2:latest"
# base_url = "http://127.0.0.1:11434"
# reasoning = true
#
# vLLM role override 예시
# [llm.observer]
# provider = "vllm"
# model = "meta-llama"
# API_KEY = "<put-your-api-key-here>"
# base_url = "http://127.0.0.1:9000/v1"
