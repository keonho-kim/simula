# Example local configuration file.
# Put real secrets in the provider-level `API_KEY` fields and do not commit them.

[env]
log_level = "INFO"
max_recipients_per_message = 2
enable_checkpointing = false
# rng_seed = 1234

[time]
# Only `max_rounds` is supported in the runtime time section.
# This is the planner round cap, not a fixed executed round count.
# The planner recommends the actual round count from the scenario, up to this cap.
# The planner and runtime decide elapsed in-world time dynamically per round.
# max_rounds = 20

[db]
provider = "sqlite"

[db.sqlite]
dir = "./data/db"
path = "./data/db/runtime.sqlite"

[db.postgresql]
host = "127.0.0.1"
port = 5432
user = "postgres"
password = "1234"
database = "simula"
schema = "simula"
runs_table = "runs"
actors_table = "actors"
activities_table = "activities"
observer_reports_table = "observer_reports"
final_reports_table = "final_reports"

[fs]
output_dir = "./output"

[llm.openai]
# кіөмҡ© OpenAI кё°ліёк°’мқҙлӢӨ.
# providerк°Җ openaiмқё roleмқҖ м•„лһҳ к°’мқ„ кё°ліёмңјлЎң мғҒмҶҚн•ҳкі ,
# roleлі„ м„ёл¶Җ мҳөм…ҳмқҖ [llm.<role>] м•Ҳм—җ м§Ғм ‘ л‘”лӢӨ.
API_KEY = "<put-your-api-key-here>"
base_url = "https://api.openai.com/v1"
reasoning_effort = "none"
verbosity = "medium"

[llm.anthropic]
API_KEY = "<put-your-api-key-here>"
base_url = "https://api.anthropic.com"
effort = "medium"

[llm.google]
# нҳ„мһ¬ google providerлҠ” Gemini APIмҷҖ Vertex AIлҘј лӘЁл‘җ м§Җмӣҗн•ңлӢӨ.
# Gemini APIлҘј м“ё л•ҢлҠ” API_KEYлҘј мӮ¬мҡ©н•ҳкі , Vertex AIлҘј м“ё л•ҢлҠ”
# project_id + location (+ н•„мҡ” мӢң credentials_path)мқ„ мӮ¬мҡ©н•ңлӢӨ.
API_KEY = "<put-your-api-key-here>"
base_url = "https://generativelanguage.googleapis.com"
# project_id = "my-gcp-project"
# location = "us-central1"
# credentials_path = "/abs/path/to/service-account.json"
thinking_budget = 256
thinking_level = "low"

[llm.bedrock]
# BedrockлҠ” ChatBedrockConverse кё°мӨҖмқҙлӢӨ.
# мқёмҰқмқҖ кё°ліём ҒмңјлЎң AWS мһҗкІ©мҰқлӘ… мІҙмқёмқ„ мӮ¬мҡ©н•ңлӢӨ.
region_name = "us-east-1"
# credentials_profile_name = "default"
# endpoint_url = "https://bedrock-runtime.us-east-1.amazonaws.com"

[llm.ollama]
base_url = "http://127.0.0.1:11434"
reasoning = false

[llm.vllm]
API_KEY = "<put-your-api-key-here>"
base_url = "http://127.0.0.1:8000/v1"

[llm.planner]
provider = "openai"
model = "gpt-5.4-mini"
max_tokens = 7192
# reasoning_effort = "low"
# verbosity = "medium"

[llm.generator]
provider = "openai"
model = "gpt-5.4-mini"
max_tokens = 7192
# reasoning_effort = "low"
# verbosity = "medium"

[llm.coordinator]
provider = "openai"
model = "gpt-5.4-mini"
max_tokens = 7192
# reasoning_effort = "low"
# verbosity = "medium"

[llm.actor]
provider = "ollama"
model = "nemotron-cascade-2:latest"
max_tokens = 7192

[llm.observer]
provider = "openai"
model = "gpt-5.4-mini"
max_tokens = 7192
# reasoning_effort = "medium"
verbosity = "low"

[llm.fixer]
# Required.
# Used only for JSON repair when a structured response fails local parsing.
provider = "openai"
model = "gpt-5.4-mini"
max_tokens = 2400
# reasoning_effort = "none"
# verbosity = "low"

# Provider-specific role override examples
#
# OpenAI role override example
# Roles with `provider = "openai"` inherit defaults from [llm.openai].
# You can place provider-specific keys directly inside [llm.<role>].
# API_KEY = "<put-your-api-key-here>"
# base_url = "https://api.openai.com/v1"
# reasoning_effort = "high"
# verbosity = "high"
#
# [llm.generator]
# provider = "openai"
# model = "gpt-5.4-mini"
# reasoning_effort = "low"
# verbosity = "medium"
#
# [llm.actor]
# provider = "openai"
# model = "gpt-5.4-mini"
# reasoning_effort = "none"
# verbosity = "low"
#
# [llm.observer]
# provider = "openai"
# model = "gpt-5.4-mini"
# reasoning_effort = "low"
# verbosity = "low"
#
# Anthropic role override example
# [llm.planner]
# provider = "anthropic"
# model = "claude-sonnet-4-5"
# API_KEY = "<put-your-api-key-here>"
# base_url = "https://api.anthropic.com"
# effort = "max"
#
# Google role override example
# [llm.generator]
# provider = "google"
# model = "gemini-2.5-flash"
# Gemini API example
# API_KEY = "<put-your-api-key-here>"
# base_url = "https://generativelanguage.googleapis.com"
# thinking_budget = 512
# thinking_level = "medium"
#
# Vertex AI example
# project_id = "my-gcp-project"
# location = "us-central1"
# credentials_path = "/abs/path/to/service-account.json"
#
# Bedrock role override example
# [llm.observer]
# provider = "bedrock"
# model = "anthropic.claude-3-5-sonnet-20240620-v1:0"
# region_name = "ap-northeast-2"
# credentials_profile_name = "default"
# endpoint_url = "https://bedrock-runtime.ap-northeast-2.amazonaws.com"
#
# Ollama role override example
# [llm.actor]
# provider = "ollama"
# model = "nemotron-cascade-2:latest"
# base_url = "http://127.0.0.1:11434"
# reasoning = true
#
# vLLM role override example
# [llm.observer]
# provider = "vllm"
# model = "meta-llama"
# API_KEY = "<put-your-api-key-here>"
# base_url = "http://127.0.0.1:9000/v1"
