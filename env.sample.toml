# Example local configuration file.
# Put real secrets in the provider-level `API_KEY` fields and do not commit them.

[env]
log_level = "INFO"
max_recipients_per_message = 2
enable_checkpointing = false
# rng_seed = 1234

[time]
# Only `max_rounds` is supported in the runtime time section.
# This is the planner round cap, not a fixed executed round count.
# The planner recommends the actual round count from the scenario, up to this cap.
# The planner and runtime decide elapsed in-world time dynamically per round.
# max_rounds = 20

[db]
provider = "sqlite"

[db.sqlite]
dir = "./data/db"
path = "./data/db/runtime.sqlite"

[db.postgresql]
host = "127.0.0.1"
port = 5432
user = "postgres"
password = "1234"
database = "simula"
schema = "simula"
runs_table = "runs"
actors_table = "actors"
activities_table = "activities"
observer_reports_table = "observer_reports"
final_reports_table = "final_reports"

[fs]
output_dir = "./output"

[llm.openai]
# 공용 OpenAI 기본값이다.
# provider가 openai인 role은 아래 값을 기본으로 상속하고,
# role별 세부 옵션은 [llm.<role>] 안에 직접 둔다.
API_KEY = "<put-your-api-key-here>"
base_url = "https://api.openai.com/v1"
reasoning_effort = "none"
verbosity = "medium"

[llm.anthropic]
API_KEY = "<put-your-api-key-here>"
base_url = "https://api.anthropic.com"
effort = "medium"

[llm.google]
# 현재 google provider는 Gemini API와 Vertex AI를 모두 지원한다.
# Gemini API를 쓸 때는 API_KEY를 사용하고, Vertex AI를 쓸 때는
# project_id + location (+ 필요 시 credentials_path)을 사용한다.
API_KEY = "<put-your-api-key-here>"
base_url = "https://generativelanguage.googleapis.com"
# project_id = "my-gcp-project"
# location = "us-central1"
# credentials_path = "/abs/path/to/service-account.json"
thinking_budget = 256
thinking_level = "low"

[llm.bedrock]
# Bedrock는 ChatBedrockConverse 기준이다.
# 인증은 기본적으로 AWS 자격증명 체인을 사용한다.
region_name = "us-east-1"
# credentials_profile_name = "default"
# endpoint_url = "https://bedrock-runtime.us-east-1.amazonaws.com"

[llm.openai-compatible]
# Generic OpenAI-compatible defaults for local or self-hosted servers.
# Non-reserved keys are forwarded through `extra_body`.
# Some servers understand extra OpenAI-style fields such as `reasoning`,
# while others expect vendor-specific payloads such as `chat_template_kwargs`.
# API_KEY is optional for many local servers; when omitted the runtime uses a placeholder.
# API_KEY = "<put-your-api-key-here>"
base_url = "http://127.0.0.1:8000/v1"
stream_usage = true

[llm.planner]
provider = "openai"
model = "gpt-5.4-mini"
max_tokens = 7192
# reasoning_effort = "low"
# verbosity = "medium"

[llm.generator]
provider = "openai"
model = "gpt-5.4-mini"
max_tokens = 7192
# reasoning_effort = "low"
# verbosity = "medium"

[llm.coordinator]
provider = "openai"
model = "gpt-5.4-mini"
max_tokens = 7192
# reasoning_effort = "low"
# verbosity = "medium"

[llm.actor]
provider = "openai-compatible"
model = "qwen3:8b"
max_tokens = 7192
stream_usage = true

[llm.observer]
provider = "openai"
model = "gpt-5.4-mini"
max_tokens = 7192
# reasoning_effort = "medium"
verbosity = "low"

[llm.fixer]
# Required.
# Used only for JSON repair when a structured response fails local parsing.
provider = "openai"
model = "gpt-5.4-mini"
max_tokens = 2400
# reasoning_effort = "none"
# verbosity = "low"

# Provider-specific role override examples
#
# OpenAI role override example
# Roles with `provider = "openai"` inherit defaults from [llm.openai].
# You can place provider-specific keys directly inside [llm.<role>].
# API_KEY = "<put-your-api-key-here>"
# base_url = "https://api.openai.com/v1"
# reasoning_effort = "high"
# verbosity = "high"
#
# [llm.generator]
# provider = "openai"
# model = "gpt-5.4-mini"
# reasoning_effort = "low"
# verbosity = "medium"
#
# [llm.actor]
# provider = "openai"
# model = "gpt-5.4-mini"
# reasoning_effort = "none"
# verbosity = "low"
#
# [llm.observer]
# provider = "openai"
# model = "gpt-5.4-mini"
# reasoning_effort = "low"
# verbosity = "low"
#
# Anthropic role override example
# [llm.planner]
# provider = "anthropic"
# model = "claude-sonnet-4-5"
# API_KEY = "<put-your-api-key-here>"
# base_url = "https://api.anthropic.com"
# effort = "max"
#
# Google role override example
# [llm.generator]
# provider = "google"
# model = "gemini-2.5-flash"
# Gemini API example
# API_KEY = "<put-your-api-key-here>"
# base_url = "https://generativelanguage.googleapis.com"
# thinking_budget = 512
# thinking_level = "medium"
#
# Vertex AI example
# project_id = "my-gcp-project"
# location = "us-central1"
# credentials_path = "/abs/path/to/service-account.json"
#
# Bedrock role override example
# [llm.observer]
# provider = "bedrock"
# model = "anthropic.claude-3-5-sonnet-20240620-v1:0"
# region_name = "ap-northeast-2"
# credentials_profile_name = "default"
# endpoint_url = "https://bedrock-runtime.ap-northeast-2.amazonaws.com"
#
# OpenAI-compatible role override example (LM Studio-style)
# [llm.actor]
# provider = "openai-compatible"
# model = "qwen3.6"
# temperature = 0.2
# max_tokens = 4096
# timeout_seconds = 60.0
# base_url = "http://127.0.0.1:1234/v1"
# stream_usage = true
# reasoning = { effort = "medium" }
# extra_body = { top_k = 20 }
#
# OpenAI-compatible role override example (vLLM-style)
# [llm.actor]
# provider = "openai-compatible"
# model = "Qwen/Qwen3-8B"
# temperature = 0.2
# max_tokens = 4096
# timeout_seconds = 60.0
# base_url = "http://127.0.0.1:8000/v1"
# stream_usage = true
# extra_body = { chat_template_kwargs = { enable_thinking = false }, top_k = 20 }
