# Example local configuration file.
# Copy this to `env.toml`, then choose one provider block and one model per role.
#
# Supported LLM roles:
# - planner: split planning calls for analysis, cast outline, action catalog, and events
# - generator: bundled actor roster generation
# - coordinator: one scene delta call per runtime scene tick
# - observer: one FinalReportDraft call
# - fixer: structured JSON repair
#
# There is no `[llm.actor]` role in the current runtime. Actors/cast still exist
# as simulation entities, but actor-by-actor LLM calls are not used.

[env]
# Console log level: INFO, DEBUG, WARNING, ERROR.
# DEBUG also prints graph node progress, structured LLM payloads, and scene beat
# details. Raw prompts/responses are still written to the JSONL run log.
log_level = "INFO"

# Maximum recipients attached to a single generated message/activity.
max_recipients_per_message = 2

# Runtime scene budget. Each scene tick still uses one coordinator LLM call;
# these values only control how much context and output that one call handles.
# max_scene_actors limits the relevant cast members selected for a scene tick.
max_scene_actors = 3
# max_scene_candidates limits deterministic action candidates offered to the LLM.
max_scene_candidates = 6
# max_scene_beats limits how many dramatized beats the LLM may return per scene.
max_scene_beats = 3

# Generation budget. Actor cards are generated in bundled chunks instead of one
# LLM call per actor; this controls the maximum cast members per bundle call.
actor_roster_chunk_size = 6

# Enable LangGraph checkpointing for resumable/debuggable runs.
enable_checkpointing = false

# Optional deterministic seed. Set this to reproduce candidate ordering and
# other seeded runtime choices across runs.
# rng_seed = 1234

[time]
# Planner round cap. Runtime can stop earlier when the simulation resolves.
# max_rounds = 20

[db]
provider = "sqlite"

[db.sqlite]
dir = "./data/db"
path = "./data/db/runtime.sqlite"

[fs]
output_dir = "./output"

# ---------------------------------------------------------------------------
# LLM provider defaults
# ---------------------------------------------------------------------------
#
# Provider tables define shared credentials/defaults. Role tables below choose
# the provider and model for each workflow role.
#
# You may put provider-specific keys directly in a role table when one role
# needs an override, for example:
#
# [llm.coordinator]
# provider = "openai-compatible"
# model = "qwen3:8b"
# base_url = "http://127.0.0.1:1234/v1"
# temperature = 0.4
# max_tokens = 4096
#
# Do not use nested role provider tables such as `[llm.planner.openai]`.

[llm.openai]
API_KEY = "<put-your-api-key-here>"
base_url = "https://api.openai.com/v1"
# GPT-5 models support reasoning_effort and verbosity.
reasoning_effort = "none"
verbosity = "medium"
# stream_usage = true

# OpenAI-compatible local/API servers such as LM Studio, vLLM, Ollama-compatible
# gateways, or OpenRouter-style endpoints.
#
# [llm.openai-compatible]
# API_KEY = "EMPTY"
# base_url = "http://127.0.0.1:1234/v1"
# stream_usage = true
# extra_body is represented by arbitrary extra keys in this table.
# reasoning = { effort = "low" }
# chat_template_kwargs = { enable_thinking = false }

# Anthropic.
#
# [llm.anthropic]
# API_KEY = "<put-your-anthropic-api-key-here>"
# base_url = "https://api.anthropic.com"
# effort = "medium"

# Google Gemini API or Vertex AI.
# Use either API_KEY for Gemini API, or project_id + location for Vertex AI.
#
# [llm.google]
# API_KEY = "<put-your-google-api-key-here>"
# project_id = "your-gcp-project"
# location = "us-central1"
# credentials_path = "/path/to/service-account.json"
# thinking_budget = 0
# thinking_level = "minimal"

# Amazon Bedrock.
#
# [llm.bedrock]
# region_name = "us-east-1"
# credentials_profile_name = "default"
# endpoint_url = "https://bedrock-runtime.us-east-1.amazonaws.com"

# ---------------------------------------------------------------------------
# LLM role routing
# ---------------------------------------------------------------------------
#
# All role tables accept:
# provider, model, temperature, max_tokens, timeout_seconds
#
# Provider-specific overrides are also allowed directly inside each role table:
# API_KEY, base_url, stream_usage, reasoning_effort, verbosity, effort,
# project_id, location, credentials_path, thinking_budget, thinking_level,
# region_name, credentials_profile_name, endpoint_url.

[llm.planner]
provider = "openai"
model = "gpt-5.4-mini"
max_tokens = 7192

[llm.generator]
provider = "openai"
model = "gpt-5.4-mini"
max_tokens = 7192

[llm.coordinator]
provider = "openai"
model = "gpt-5.4-mini"
max_tokens = 7192

[llm.observer]
provider = "openai"
model = "gpt-5.4-mini"
max_tokens = 7192
verbosity = "low"

[llm.fixer]
# Required for structured JSON repair.
provider = "openai"
model = "gpt-5.4-mini"
max_tokens = 2400
verbosity = "low"

# ---------------------------------------------------------------------------
# Provider-specific role examples
# ---------------------------------------------------------------------------
#
# Local OpenAI-compatible example:
#
# [llm.planner]
# provider = "openai-compatible"
# model = "qwen3:8b"
# base_url = "http://127.0.0.1:1234/v1"
# stream_usage = true
# max_tokens = 4096
#
# [llm.generator]
# provider = "openai-compatible"
# model = "qwen3:8b"
# max_tokens = 4096
#
# [llm.coordinator]
# provider = "openai-compatible"
# model = "qwen3:8b"
# temperature = 0.4
# max_tokens = 4096
#
# [llm.observer]
# provider = "openai-compatible"
# model = "qwen3:8b"
# max_tokens = 4096
#
# [llm.fixer]
# provider = "openai-compatible"
# model = "qwen3:8b"
# temperature = 0.0
# max_tokens = 2048
#
# Anthropic role example:
#
# [llm.planner]
# provider = "anthropic"
# model = "claude-sonnet-4-5"
# effort = "medium"
# max_tokens = 7192
#
# Google role example:
#
# [llm.coordinator]
# provider = "google"
# model = "gemini-2.5-flash"
# thinking_level = "minimal"
# max_tokens = 4096
#
# Bedrock role example:
#
# [llm.observer]
# provider = "bedrock"
# model = "anthropic.claude-3-5-sonnet-20241022-v2:0"
# region_name = "us-east-1"
# max_tokens = 4096
